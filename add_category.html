{% extends 'base.html' %}
{% block title %}Tambah Kategori - InvenTrack{% endblock %}
{% block page_title %}Tambah Kategori{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-dark">
            <div class="section-title mb-4">Form Kategori</div>
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label-custom">Nama Kategori</label>
                        {{ form.name }}
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">Kode</label>
                        {{ form.code }}
                    </div>
                    <div class="col-12">
                        <label class="form-label-custom">Deskripsi</label>
                        {{ form.description }}
                    </div>
                    <div class="col-12 d-flex align-items-center gap-2">
                        {{ form.is_active }}
                        <label style="font-size:13px; color:var(--text-secondary);">Aktif</label>
                    </div>
                </div>
                <hr class="divider">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn-primary-custom"><i class="bi bi-check2"></i> Simpan</button>
                    <a href="{% url 'products:category_list' %}" class="btn-outline-custom">Batal</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
